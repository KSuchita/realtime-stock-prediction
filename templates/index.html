<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .price-val { font-size: 2.5rem; font-weight: bold; }
        .current-text { color: #0d6efd; }
        .predict-text { color: #198754; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card p-4">
                    <h2 class="mb-4">Stock Dashboard: {{ data.symbol }}</h2>
                    <hr>
                    
                    <div class="mb-4">
                        <p class="text-muted mb-1">Current Price</p>
                        <div class="price-val current-text">₹{{ data.current }}</div>
                    </div>

                    <div class="mb-4">
                        <p class="text-muted mb-1">Predicted Price (Next Session)</p>
                        <div class="price-val predict-text">₹{{ data.predicted }}</div>
                    </div>

                    <p class="text-muted small">Last Updated: {{ data.date }}</p>
                    
                    <a href="/" class="btn btn-outline-primary mt-3">Refresh Data</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
