<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Predictor Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .stat-card { background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%); }
        .price-up { color: #2ecc71; font-weight: bold; }
        .main-price { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        .header-bg { background: #000; color: #fff; padding: 20px 0; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="header-bg">
        <div class="container text-center">
            <h1 class="h4 mb-0">{{ data.symbol }} AI PREDICTOR</h1>
        </div>
    </div>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card stat-card p-4 mb-4">
                    <p class="text-muted small mb-1">LAST CLOSING PRICE</p>
                    <div class="main-price text-dark">₹{{ data.current }}</div>
                </div>
                <div class="card stat-card p-4">
                    <p class="text-muted small mb-1">PREDICTION FOR MONDAY</p>
                    <div class="main-price text-success">₹{{ data.predicted }}</div>
                    <p class="small {% if data.predicted > data.current %}text-success{% else %}text-danger{% endif %}">
                        Trend: {{ "Bullish" if data.predicted > data.current else "Bearish" }}
                    </p>
                </div>
                <div class="mt-3 text-center">
                    <span class="badge bg-secondary">{{ data.status }}</span>
                    <p class="text-muted x-small mt-2">{{ data.date }}</p>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card p-3">
                    <div id="chart" style="height: 450px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var graphs = {{ graphJSON | safe }};
        Plotly.newPlot('chart', graphs.data, graphs.layout, {responsive: true});
    </script>
</body>
</html>
