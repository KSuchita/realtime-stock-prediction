<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .price-box { padding: 20px; border-radius: 15px; background: #fff; margin-bottom: 20px; }
        #comparisonSection { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <div class="card p-5">
                    <h2 class="mb-4">{{ data.symbol }}</h2>
                    <p class="text-muted">{{ data.date }}</p>
                    <hr>
                    
                    <div class="row">
                        <div class="col-6">
                            <p class="small text-muted mb-0">CURRENT PRICE</p>
                            <h3 class="text-primary">₹{{ data.current }}</h3>
                        </div>
                        <div class="col-6">
                            <p class="small text-muted mb-0">PREDICTED (MON)</p>
                            <h3 class="text-success">₹{{ data.predicted }}</h3>
                        </div>
                    </div>

                    <button class="btn btn-dark mt-4 py-2 px-4" onclick="toggleGraph()">
                        Show Comparison Analysis
                    </button>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-4" id="comparisonSection">
            <div class="col-lg-10">
                <div class="card p-4">
                    <div id="barChart"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleGraph() {
            var x = document.getElementById("comparisonSection");
            if (x.style.display === "none" || x.style.display === "") {
                x.style.display = "block";
                // Trigger Plotly resize to fit the new container
                Plotly.Plots.resize('barChart');
            } else {
                x.style.display = "none";
            }
        }

        var graphs = {{ graphJSON | safe }};
        Plotly.newPlot('barChart', graphs.data, graphs.layout, {responsive: true});
    </script>
</body>
</html>
