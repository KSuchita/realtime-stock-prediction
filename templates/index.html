<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliance Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .dashboard-container { max-width: 800px; margin: 50px auto; }
        .card { border: none; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #comparisonSection { display: none; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container dashboard-container">
        <div class="card p-5 text-center">
            <h2 class="fw-bold">{{ data.symbol }} AI Prediction</h2>
            <p class="text-muted">{{ data.date }}</p>
            <hr>
            <div class="row my-4">
                <div class="col-6">
                    <p class="mb-1 text-secondary small">CURRENT PRICE</p>
                    <h2 class="text-primary">₹{{ data.current }}</h2>
                </div>
                <div class="col-6">
                    <p class="mb-1 text-secondary small">PREDICTED (MON)</p>
                    <h2 class="text-success">₹{{ data.predicted }}</h2>
                </div>
            </div>
            <button class="btn btn-dark btn-lg w-100" onclick="toggleComparison()">Compare Actual vs Predicted</button>
        </div>

        <div id="comparisonSection">
            <div class="card p-4">
                <div id="comparisonChart"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleComparison() {
            var section = document.getElementById("comparisonSection");
            if (section.style.display === "none" || section.style.display === "") {
                section.style.display = "block";
                Plotly.Plots.resize('comparisonChart');
            } else {
                section.style.display = "none";
            }
        }

        var graphs = {{ graphJSON | safe }};
        Plotly.newPlot('comparisonChart', graphs.data, graphs.layout, {responsive: true});
    </script>
</body>
</html>
